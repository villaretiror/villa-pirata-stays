<!DOCTYPE html>
<html>
<head>
  <style>
    body { margin: 0; background: #1a1a1a; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: 'Playfair Display', serif; }
    .logo-container { text-align: center; border: 1px solid rgba(187, 162, 126, 0.2); padding: 60px 100px; border-radius: 40px; background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(20px); }
    .vrr { font-size: 150px; font-weight: 900; font-style: italic; color: #BBA27E; letter-spacing: -0.05em; display: block; margin-bottom: -10px; }
    .signature { font-family: 'Outfit', sans-serif; font-size: 20px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.6em; color: #BBA27E; opacity: 0.8; margin-top: 20px; }
    .line { width: 120px; height: 1px; background: #BBA27E; margin: 25px auto 0; opacity: 0.4; }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,900&family=Outfit:wght@900&display=swap" rel="stylesheet">
</head>
<body>
  <div class="logo-container">
    <span class="vrr">VRR</span>
    <div class="line"></div>
    <div class="signature">Cabo Rojo · Puerto Rico</div>
  </div>
</body>
</html>
