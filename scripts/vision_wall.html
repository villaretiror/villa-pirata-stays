<!DOCTYPE html>
<html>
<head>
    <title>Salty Vision Wall</title>
    <style>
        body { font-family: sans-serif; background: #000; color: #fff; padding: 20px; }
        .property { margin-bottom: 50px; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }
        .item { border: 1px solid #333; padding: 5px; position: relative; }
        img { width: 100%; border-radius: 4px; }
        .label { position: absolute; bottom: 10px; left: 10px; background: rgba(0,0,0,0.7); padding: 2px 5px; font-size: 10px; }
    </style>
</head>
<body>
    <h1>⚓ Muro de Visión - Clasificación Maestro</h1>
    
    <div class="property">
        <h2>🏷️ Pirata Family House (22 fotos)</h2>
        <div class="gallery" id="pirata_gallery"></div>
    </div>

    <div class="property">
        <h2>🏷️ Villa Retiro R (28 fotos)</h2>
        <div class="gallery" id="vr_gallery"></div>
    </div>

    <script>
        const pirataTotal = 22;
        const vrTotal = 28;
        const baseURL = "https://plpnydhgvqoqwrvuzvzq.supabase.co/storage/v1/object/public/villas";

        const pGall = document.getElementById('pirata_gallery');
        for(let i=1; i<=pirataTotal; i++){
            pGall.innerHTML += `<div class="item">
                <img src="${baseURL}/pirata/pirata_${i}.jpg">
                <div class="label">pirata_${i}.jpg</div>
            </div>`;
        }

        const vGall = document.getElementById('vr_gallery');
        for(let i=1; i<=vrTotal; i++){
            vGall.innerHTML += `<div class="item">
                <img src="${baseURL}/villa-retiro/vr_${i}.jpg">
                <div class="label">vr_${i}.jpg</div>
            </div>`;
        }
    </script>
</body>
</html>
