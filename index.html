      "@type": "VacationRental",
      "name": "Villa Retiro & Pirata Stays",

        "@type": "PostalAddress",
        "addressLocality": "Cabo Rojo",
        "addressRegion": "PR",
        "addressCountry": "US"
      },
      "amenityFeature": [
        {
          "@type": "LocationFeatureSpecification",
          "name": "Boutique Stay Experience",
          "value": "Íntimo y Sofisticado"
        },
        {
          "@type": "LocationFeatureSpecification",
          "name": "Modern Tropical Design",
          "value": "Yes"
        },
        {
          "@type": "LocationFeatureSpecification",
          "name": "Strategic Proximity to Beaches",
          "value": "Buyé & Boquerón"
        },
        {
          "@type": "LocationFeatureSpecification",
          "name": "Peaceful Environment",
