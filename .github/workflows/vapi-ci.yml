name: Vapi Master CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  vapi-security-and-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Dependencies
        run: npm ci

      - name: Install Vapi CLI
        run: |
          curl -sSL https://vapi.ai/install.sh | bash
          echo "$HOME/.vapi/bin" >> $GITHUB_PATH

      - name: Validate Local Vapi Configuration
        run: |
          export PATH="$HOME/.vapi/bin:$PATH"
          vapi init --skip-install || echo "Vapi skip-install ignored in CI"

      # Correr tests unitarios del webhook para asegurar el { results: [] }
      - name: Start Local Webhook Emulator
        run: |
           npx vite --port 3000 --host 127.0.0.1 &
           echo "Waiting for server..."
           sleep 10
        env:
          VAPI_WEBHOOK_SECRET: "test_secret_ci"
          
      - name: Run Webhook Integrations Tests
        run: npx -y tsx scripts/test_vapi_webhook.ts
        env:
          VAPI_WEBHOOK_URL: 'http://127.0.0.1:3000/api/webhooks?source=vapi'
          VAPI_WEBHOOK_SECRET: 'test_secret_ci'
